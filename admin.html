<!DOCTYPE html>
<html>
<head>
<title>Admin Manggarai Cup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏆 Admin Panel</h1>

<div id="loginBox">
  <input type="password" id="password" placeholder="Password admin">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none">

  <h2>Tambah Tim</h2>
  <input type="text" id="teamName" placeholder="Nama Tim">
  <select id="group">
    <option value="A">Grup A</option>
    <option value="B">Grup B</option>
  </select>
  <button onclick="addTeam()">Tambah</button>

  <hr>

  <h2>Input Skor</h2>

  <select id="team1"></select>
  <input type="number" id="score1">

  VS

  <input type="number" id="score2">
  <select id="team2"></select>

  <br><br>

  <button onclick="saveScore()">Simpan</button>

</div>

<script src="script.js"></script>

</body>
</html>
